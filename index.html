<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regiment | Army Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-nav">
        <div class="brand" onclick="goHome()" style="cursor: pointer;" title="Return to Faction Select">REGIMENT</div>
        
        <div class="global-controls" id="builderControls" style="display: none;">
            <div class="control-group">
                <label for="armyCap">Points Cap</label>
                <input type="number" id="armyCap" value="1000" step="5">
            </div>
            <div class="control-group">
                <label for="factionSelect">Faction</label>
                <select id="factionSelect">
                    </select>
            </div>
            <div class="control-group">
                <label for="sortSelect">Sort</label>
                <select id="sortSelect">
                    <option value="default">Default</option>
                    <option value="alpha">A-Z</option>
                    <option value="cost-high">Cost: High-Low</option>
                </select>
            </div>
            <div class="control-group toggle">
                <label><input type="checkbox" id="overrideToggle"> Override Limits</label>
            </div>
        </div>
    </header>

    <div id="homeView" class="home-container">
        <h1 class="home-title">Select Your Faction</h1>
        
        <h2 class="faction-group-title">Major Factions</h2>
        <div id="majorFactionsGrid" class="factions-grid major-grid">
            </div>

        <h2 class="faction-group-title" style="margin-top: 50px;">Minor Factions</h2>
        <div id="minorFactionsGrid" class="factions-grid minor-grid">
            </div>
    </div>

    <div id="builderView" class="app-container" style="display: none;">
        <main class="roster-panel">
            <h2 class="panel-title">Unit Roster</h2>
            <div id="unitList" class="roster-list"></div>
            
            <h2 class="panel-title" style="margin-top: 30px;">Off-Table Support</h2>
            <div id="otsList" class="roster-list"></div>
        </main>

        <aside class="manifest-panel">
            <div class="sticky-wrapper">
                <h2 class="panel-title">Army List</h2>
                <div id="manifestList" class="manifest-items"></div>
                <div id="manifestOtsList" class="manifest-items" style="margin-top: 15px;"></div>

                <div class="manifest-footer">
                    <div class="totals-row">
                        <span>Total Cost:</span>
                        <span id="totalSpent" class="total-value">0 / 1000</span>
                    </div>
                    <div class="totals-row" style="font-size: 0.9rem; color: var(--text-muted);">
                        <span>OTS Limits:</span>
                        <span id="otsTracker">0 / 150 pts | 0 / 4 cards</span>
                    </div>
                    <div class="totals-row">
                        <span>Initiative Bid:</span>
                        <span id="bidDisplay">1000</span>
                    </div>
                    <button id="btnClearList" class="btn-clear">Clear Army</button>
                </div>

                <div class="export-section">
                    <h3 class="export-title">Export Options</h3>
                    <div class="export-controls">
                        <button id="btnCopySimple" class="btn-export">Simple TXT</button>
                        <button id="btnCopyDetailed" class="btn-export">Detailed TXT</button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script src="data.js"></script>
    <script src="engine.js"></script>
</body>
</html>
